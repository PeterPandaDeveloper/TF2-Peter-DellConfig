// --- MEDIC CONFIGURATION ---
bind "mouse2" "+attack2" // Normal Uber/Shield activation

// Medic Radar (See teammates' health through walls)
hud_medicautocallers 1
alias "autocall_default" "tf_medic_autocall_level 75"
alias "autocall_all" "tf_medic_autocall_level 150"
autocall_default

// Communication Binds
bind "1" "voicemenu 1 7; say_team **UBER AT 100%**"
bind "2" "voicemenu 1 7; say_team **FAKE UBER - IT'S A TRICK**"
bind "3" "voicemenu 2 2; say_team **ENEMY MEDIC DOWN!**"
bind "4" "voicemenu 0 1" // "Thanks!"
bind "5" "voicemenu 1 1"

// Panic Button (Reset to Medic)
bind "h" "join_class random; wait 200; join_class medic"
