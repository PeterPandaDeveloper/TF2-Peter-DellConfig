//configs externas
bind "5" "exec tryhard"
bind "6" "exec pub"

//binds normales
bind "q" "slot1"
bind "e" "slot2"
bind "r" "slot3"
bind "space" "+jump"
bind "f" "+inspect"
bind "g" "+taunt"
bind "k" "explode"
bind "l" "dropitem"
bind "k" "explode"
bind "\" "toggleconsole"

//raton
bind "MWHEELDOWN" "+jump"
bind "mwheelup" "+use_action_slot_item"
bind "Mouse4" "+use_action_slot_item"
bind "Mouse5" "voicemenu 0 0"
bind "Mouse5" "+voicerecord"

//visual
viewmodel_fov 110
fov_desired 90
fps_max 300

//hitsound
tf_dingaling_pitchmindmg 160
tf_dingaling_pitchmaxdmg 90

//cosos varios
sv_allow_point_servercommand always
tf_scoreboard_mouse_mode 2
bindtoggle alt r_drawviewmodel
hud_combattext 1
hud_combattext_batching 1
hud_combattext_batching_window "0.2"

//net_graph solo tab
alias "+sb" "+showscores; net_graph 1"
alias "-sb" "-showscores; net_graph 0"
bind "TAB" "+sb; tf_scoreboard_mouse_mode 2"
net_graphheight "100"
net_graphpos "400"
net_graphproportionalfont "100"
net_graphshowinterp "1"
net_graphshowlatency "1"
net_graphsolid "1"
net_graphtext "1"
// --- CONFIGURACIÓN DE NAVEGACIÓN Y VOTOS ---
bind "LEFTARROW" "vote option1"      // Votar SÍ
bind "RIGHTARROW" "vote option2"     // Votar NO
bind "UPARROW" "incrementvar volume 0 1 0.05"   // Subir volumen
bind "DOWNARROW" "incrementvar volume 0 1 -0.05" // Bajar volumen

// --- LOADOUT MVM Y EMERGENCIA ---
bind "PGUP" "load_itempreset 3"      // Carga el espacio D (MvM)
bind "PGDN" "kill"                   // Suicidio rápido

// --- ACCIÓN ESPECIAL (Hype, Escudo, Cantimploras) ---
// El botón de la ruedita activa el slot de acción (Escudo/Canteens/Hype)
bind "MOUSE3" "+use_action_slot_item"

// --- RECARGA ---
bind "r" "+reload"                   // Mantener recarga en R por comodidad
