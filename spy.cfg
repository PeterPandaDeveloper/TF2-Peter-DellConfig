bind "mouse2" "+attack2"

//zoom + quitar modelos
bind "shift" "zoomer"
alias nozoom "fov_desired 110; r_drawviewmodel 1; alias zoomer yeszoom"
alias yeszoom "fov_desired 25; r_drawviewmodel 0; alias zoomer nozoom"
nozoom

bind h "join_class random;wait 200; join_class spy"

// --- PROFESSIONAL SPY DISGUISES (LINEAR SETUP) ---

// Top Row: Enemy Disguises (1-4: The Meta / 6-0: Remaining Classes)
bind "1" "disguise 1 -1"    // Scout (Enemy)
bind "2" "disguise 2 -1"    // Sniper (Enemy)
bind "3" "disguise 7 -1"    // Pyro (Enemy)
bind "4" "disguise 9 -1"    // Engineer (Enemy)

// 5: Friendly Disguise (Bait / Hide presence)
bind "5" "disguise 1 2"     // Scout (Friendly)

// 6-0: Rest of Enemy Classes
bind "6" "disguise 3 -1"    // Soldier (Enemy)
bind "7" "disguise 4 -1"    // Demoman (Enemy)
bind "8" "disguise 5 -1"    // Medic (Enemy)
bind "9" "disguise 6 -1"    // Heavy (Enemy)
bind "0" "disguise 8 -1"    // Spy (Enemy)

// Extra utility for remaining slots
bind "-" "lastdisguise"     // Quick re-disguise
bind "=" "disguise 8 -2"    // Spy (Friendly) - Very niche, but fills the slot

// Keeping your Numpad as physical backup on DELL7
bind "kp_end" "disguise 1 -1"
bind "kp_downarrow" "disguise 3 -1"
bind "kp_pgdn" "disguise 7 -1"
bind "kp_leftarrow" "disguise 4 -1"
bind "kp_5" "disguise 6 -1"
bind "kp_rightarrow" "disguise 9 -1"
bind "kp_home" "disguise 5 -1"
bind "kp_uparrow" "disguise 2 -1"
bind "kp_pgup" "disguise 8 -1"
