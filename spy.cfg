bind "mouse2" "+attack2"

//zoom + quitar modelos
bind "shift" "zoomer"
alias nozoom "fov_desired 110; r_drawviewmodel 1; alias zoomer yeszoom"
alias yeszoom "fov_desired 25; r_drawviewmodel 0; alias zoomer nozoom"
nozoom

bind h "join_class random;wait 200; join_class spy"

bind 1 "voicemenu 1 6; say_team POP IT MEDIC!!"

unbind 2

bind 3 "voicemenu 2 2; say_team Med down!"

bind 4 "voicemenu 0 1"

//binds spy disguises
bind "kp_end" "disguise 1 -1"                
bind "kp_downarrow" "disguise 3 -1"              
bind "kp_pgdn" "disguise 7 -1"                
bind "kp_leftarrow" "disguise 4 -1"              
bind "kp_5" "disguise 6 -1"
bind "kp_rightarrow" "disguise 9 -1"            
bind "kp_home" "disguise 5 -1"                
bind "kp_uparrow" "disguise 2 -1"               
bind "kp_pgup" "disguise 8 -1"  